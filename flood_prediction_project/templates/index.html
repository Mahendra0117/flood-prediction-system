<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Risk Analytics Portal</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            /* Points directly to your local file path within the Flask framework framework */
            background: url('/static/360_F_211524227_Ett8aboQvVnROAFtqu3S1pW99Y3Th9vm.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #1e293b;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
        }
        
        /* Dark tint layer to ensure crisp text contrast over the image background */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.4);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }
        
        .card-header-custom {
            padding: 2.5rem 2rem 1.5rem 2rem;
            text-align: center;
        }
        .card-header-custom h2 {
            font-weight: 700;
            color: #0f172a;
            font-size: 1.75rem;
        }
        .card-header-custom p {
            color: #475569;
            font-size: 0.95rem;
            margin-top: 0.5rem;
            font-weight: 500;
        }
        .form-label {
            font-weight: 600;
            color: #334155;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        .input-group-custom {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }
        .input-icon {
            position: absolute;
            left: 16px;
            color: #64748b;
            z-index: 10;
        }
        .form-control-custom {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 2.8rem;
            background-color: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            color: #0f172a;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .form-control-custom:focus {
            background-color: #ffffff;
            border-color: #475569;
            box-shadow: 0 0 0 4px rgba(71, 85, 105, 0.12);
            outline: none;
        }
        .btn-submit {
            background: linear-gradient(135deg, #102fb9 0%, #052996 100%);
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-size: 1.05rem;
            font-weight: 600;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(16, 47, 185, 0.2);
            transition: all 0.2s ease;
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, #102fb9 0%, #052996 100%);
            transform: translateY(-1px);
            box-shadow: 0 8px 16px rgba(16, 50, 185, 0.3);
        }
        .result-panel {
            border-radius: 14px;
            padding: 1.25rem;
            margin-top: 2rem;
            border: 1px solid transparent;
        }
        .panel-danger {
            background-color: #fef2f2;
            border-color: #fee2e2;
            color: #991b1b;
        }
        .panel-success {
            background-color: #f0fdf4;
            border-color: #dcfce7;
            color: #166534;
        }
        .panel-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">
            <div class="card main-card">
                <div class="card-header-custom">
                    <h2>Flood Risk Analytics Portal</h2>
                    <p>Machine Learning Predictive Environment</p>
                </div>
                
                <div class="card-body px-4 pb-5 pt-2">
                    <form action="/predict" method="POST">
                        <div class="mb-4">
                            <label class="form-label">Annual Rainfall (mm)</label>
                            <div class="input-group-custom">
                                <i class="fa-solid fa-cloud-rain input-icon"></i>
                                <input type="number" step="any" name="annual_rainfall" class="form-control-custom" placeholder="e.g., 2400" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Cloud Visibility Index (0 - 10)</label>
                            <div class="input-group-custom">
                                <i class="fa-solid fa-eye input-icon"></i>
                                <input type="number" step="any" name="cloud_visibility" class="form-control-custom" placeholder="e.g., 5.5" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Monsoon Seasonal Rainfall (mm)</label>
                            <div class="input-group-custom">
                                <i class="fa-solid fa-water input-icon"></i>
                                <input type="number" step="any" name="monsoon_rainfall" class="form-control-custom" placeholder="e.g., 1600" required>
                            </div>
                        </div>

                        <div class="d-grid mt-5">
                            <button type="submit" class="btn btn-submit">
                                Run Predictive Inference
                            </button>
                        </div>
                    </form>

                    {% if prediction_text %}
                        {% if 'HIGH RISK' in prediction_text %}
                            <div class="result-panel panel-danger" role="alert">
                                <div class="panel-title"><i class="fa-solid fa-triangle-exclamation"></i> Threat Level Warning</div>
                                <p class="mb-0 small">{{ prediction_text }}</p>
                            </div>
                        {% else %}
                            <div class="result-panel panel-success" role="alert">
                                <div class="panel-title"><i class="fa-solid fa-circle-check"></i> System Nominal</div>
                                <p class="mb-0 small">{{ prediction_text }}</p>
                            </div>
                        {% endif %}
                    {% endif %}
                </div>
            </div>
            <p class="text-center text-light small mt-4 opacity-75">Predictive Engine v1.0.0</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
